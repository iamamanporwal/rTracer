<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0a0b" />
    <!-- Standalone / home-screen behaviour so the game runs chrome-free on
         mobile. iPhone Safari ignores the Fullscreen API, so these + the
         address-bar-hiding viewport are how we approach fullscreen there. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trace" />
    <meta name="description" content="Trace — browser-native motorsport sandbox." />
    <title>Trace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        background: #0a0a0b;
        color: #f4f4f5;
        font-family:
          'Inter',
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        overscroll-behavior: none;
        touch-action: none;
      }
      /* Lock the page on touch devices: no rubber-band scroll that reveals
         browser chrome, no double-tap zoom, no blue tap-flash on the touch
         controls, no long-press callout. Scoped to coarse pointers so the
         scrollable desktop dev hub is left completely alone. */
      @media (pointer: coarse) {
        html,
        body {
          overflow: hidden;
          -webkit-tap-highlight-color: transparent;
          -webkit-touch-callout: none;
        }
        body {
          position: fixed;
          inset: 0;
          -webkit-user-select: none;
          user-select: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
